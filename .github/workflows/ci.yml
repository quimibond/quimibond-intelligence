name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      # Build is validated by Vercel on every PR (preview deployment).
      # Running it here with a placeholder Supabase URL causes prerender
      # failures on ISR pages that fetch real data, producing false negatives.
